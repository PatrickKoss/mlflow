[mlflow]
default_permission = READ
database_uri = postgresql://mlflow:mlflow@localhost:5432/mlflow_auth
admin_username = admin
admin_password = password-for-testing
authorization_function = mlflow.server.auth.oauth.app:authenticate_request_oauth

[oauth]
session_lifetime_seconds = 86400
idle_timeout_seconds = 3600
session_refresh_threshold_seconds = 30
session_cookie_name = mlflow_session
session_cookie_secure = false
encryption_key = 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
auto_provision_users = true
allow_basic_auth_fallback = true
auto_redirect_single_provider = true

[oauth.oidc.keycloak]
enabled = true
display_name = Sign in with Keycloak
discovery_url = http://localhost:8080/realms/mlflow/.well-known/openid-configuration
client_id = mlflow
client_secret = mlflow-client-secret
scopes = openid
redirect_uri = http://localhost:5000/auth/callback
username_claim = preferred_username
email_claim = email
groups_claim = groups
name_claim = name
role_mappings = readers:READ, editors:EDIT, admins:MANAGE
admin_groups = admins

[oauth.external_authz]
enabled = true
endpoint = http://localhost:9000/v1/check
forward_token = true
cache_ttl_seconds = 60
cache_max_size = 1000
timeout_seconds = 5
max_retries = 1
retry_backoff_seconds = 0.5
on_error = fallback_to_default
